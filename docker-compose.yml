x-kafka-env: &kafka-env
  KAFKA_BROKER_URL: ${KAFKA_BROKER_URL:-kafka:9092}
  KAFKA_TOPIC: ${KAFKA_TOPIC:-transactions}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      # Host-side tooling connects on localhost:29092 (the EXTERNAL listener).
      # In-network services use kafka:9092 directly over the Compose network and
      # need no published port.
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: INTERNAL is advertised under the Compose DNS name for
      # in-network clients; EXTERNAL is advertised as localhost so a host client
      # reached via the published port is not redirected to the unresolvable
      # kafka:9092. A single kafka:9092 listener strands host-side producers.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  transactions-historical:
    build:
      context: .
      dockerfile: services/transactions-historical/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *kafka-env
      ETHERSCAN_CONTRACT_ADDRESS: ${ETHERSCAN_CONTRACT_ADDRESS:-0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640}
      ETHERSCAN_HISTORICAL_FIRST_BLOCK: ${ETHERSCAN_HISTORICAL_FIRST_BLOCK:-18000000}
      ETHERSCAN_HISTORICAL_LAST_BLOCK: ${ETHERSCAN_HISTORICAL_LAST_BLOCK:-18001000}
      ETHERSCAN_HISTORICAL_BATCH_SIZE: ${ETHERSCAN_HISTORICAL_BATCH_SIZE:-100}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}

  transactions-realtime:
    build:
      context: .
      dockerfile: services/transactions-realtime/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *kafka-env
      ETHERSCAN_CONTRACT_ADDRESS: ${ETHERSCAN_CONTRACT_ADDRESS:-0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640}
      INFURA_POLL_INTERVAL: ${INFURA_POLL_INTERVAL:-15}
      INFURA_PROJECT_ID: ${INFURA_PROJECT_ID:-}

  message-consumer:
    build:
      context: .
      dockerfile: services/message-consumer/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      <<: *kafka-env
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-message-consumer}
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017/eth_tx_pipeline}
      ETH_USD_EXCHANGE_RATE: ${ETH_USD_EXCHANGE_RATE:-3000.0}

  endpoint-server:
    build:
      context: .
      dockerfile: services/endpoint-server/Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017/eth_tx_pipeline}

  db-indexing-sidecar:
    build:
      context: .
      dockerfile: services/db-indexing-sidecar/Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017/eth_tx_pipeline}

volumes:
  mongo-data:

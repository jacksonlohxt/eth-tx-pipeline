name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check services shared

  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pip install -e shared
      - run: pytest shared/tests

  test-service:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - transactions-historical
          - transactions-realtime
          - message-consumer
          - endpoint-server
          - db-indexing-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pip install -e shared
      - run: pip install -r services/${{ matrix.service }}/requirements.txt
      - run: pytest tests
        working-directory: services/${{ matrix.service }}
